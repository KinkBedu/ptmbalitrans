services:
  mongodb:
    image: mongo:7
    container_name: ptmbalitrans-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ptmbalitrans
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
    driver: local